name: Pre-release Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      require_hosted_smoke:
        description: Require hosted test smoke to pass.
        required: false
        type: boolean
        default: false
    secrets:
      TOOLLIST_TEST_TOKEN:
        required: false

jobs:
  verify-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify packed install smoke
        run: npm run verify:pack-install

  hosted-test-smoke-optional:
    if: ${{ !inputs.require_hosted_smoke }}
    needs: verify-package
    runs-on: ubuntu-latest

    steps:
      - name: Check hosted smoke token
        id: hosted-smoke-token
        env:
          TOOLLIST_TEST_TOKEN: ${{ secrets.TOOLLIST_TEST_TOKEN }}
        run: |
          if [ -n "$TOOLLIST_TEST_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Skipping optional hosted smoke because TOOLLIST_TEST_TOKEN is not configured."
          fi

      - name: Check out repository
        if: ${{ steps.hosted-smoke-token.outputs.present == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ steps.hosted-smoke-token.outputs.present == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.hosted-smoke-token.outputs.present == 'true' }}
        run: npm ci

      - name: Build package
        if: ${{ steps.hosted-smoke-token.outputs.present == 'true' }}
        run: npm run build

      - name: Run hosted test smoke
        if: ${{ steps.hosted-smoke-token.outputs.present == 'true' }}
        env:
          TOOLLIST_TEST_TOKEN: ${{ secrets.TOOLLIST_TEST_TOKEN }}
          TOOLLIST_TEST_BASE_URL: ${{ vars.TOOLLIST_TEST_BASE_URL }}
          TOOLLIST_TEST_ENV: ${{ vars.TOOLLIST_TEST_ENV }}
        run: npm run smoke:test

  hosted-test-smoke-required:
    if: ${{ inputs.require_hosted_smoke }}
    needs: verify-package
    runs-on: ubuntu-latest

    steps:
      - name: Fail if hosted smoke token is missing
        env:
          TOOLLIST_TEST_TOKEN: ${{ secrets.TOOLLIST_TEST_TOKEN }}
        run: |
          if [ -z "$TOOLLIST_TEST_TOKEN" ]; then
            echo "Missing TOOLLIST_TEST_TOKEN secret for required hosted smoke."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run hosted test smoke
        env:
          TOOLLIST_TEST_TOKEN: ${{ secrets.TOOLLIST_TEST_TOKEN }}
          TOOLLIST_TEST_BASE_URL: ${{ vars.TOOLLIST_TEST_BASE_URL }}
          TOOLLIST_TEST_ENV: ${{ vars.TOOLLIST_TEST_ENV }}
        run: npm run smoke:test
